<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chord Drone — Embed</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>

        /* ── Global ─────────────────────────────────────────────────────── */
        :root {
            --paper: #f5f0e8;
            --paper-dark: #ece4d0;
            --ink: #1a1510;
            --ink-light: #3d2e1e;
            --ink-muted: #7a6a56;
            --border: #c8b89a;
            --amber: #c8841a;
            --red: #8b2020;
            --blue: #1a3060;
            --green: #1a5c2a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Libre Baskerville', serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
        }

        /* ── Main Container ─────────────────────────────────────────────── */
        #drone {
            padding: 1.5rem 1rem 3rem;
            max-width: 640px;
            margin: 0 auto;
            background:
                radial-gradient(ellipse at 80% 15%, rgba(26,48,96,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 85%, rgba(26,92,42,0.05) 0%, transparent 50%),
                var(--paper);
            min-height: 100vh;
        }

        /* ── Header ─────────────────────────────────────────────────────── */
        .tool-header {
            text-align: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .tool-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -0.01em;
        }

        /* ── Cards ──────────────────────────────────────────────────────── */
        .card {
            border: 2px solid var(--ink);
            border-radius: 4px;
            padding: 1.2rem 1rem;
            margin-bottom: 1.2rem;
        }
        .control-group { margin-bottom: 1.2rem; }
        .control-group:last-child { margin-bottom: 0; }

        /* ── Labels ─────────────────────────────────────────────────────── */
        label.section-label {
            display: block;
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--ink-muted);
            margin-bottom: 0.5rem;
        }

        /* ── Sound Buttons ──────────────────────────────────────────────── */
        .sound-grid { 
            display: grid; 
            grid-template-columns: repeat(2,1fr); 
            gap: 0.5rem; 
        }
        .sound-btn {
            padding: 0.5rem;
            background: none;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-family: 'Libre Baskerville', serif;
            font-size: 0.75rem;
            color: var(--ink-light);
            cursor: pointer;
            transition: all 0.12s;
        }
        .sound-btn:hover { 
            background: var(--paper-dark); 
            border-color: var(--ink); 
        }
        .sound-btn.active { 
            background: var(--ink); 
            color: var(--paper); 
            border-color: var(--ink); 
            font-weight: 700; 
        }

        /* ── Range Slider ───────────────────────────────────────────────── */
        input[type="range"] { 
            width: 100%; 
            height: 3px; 
            -webkit-appearance: none; 
            background: var(--border); 
            border-radius: 2px; 
            outline: none; 
        }
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; 
            width: 14px; 
            height: 14px; 
            border-radius: 50%; 
            background: var(--ink); 
            cursor: pointer; 
        }
        input[type="range"]::-moz-range-thumb {
            width: 14px; 
            height: 14px; 
            border-radius: 50%; 
            background: var(--ink); 
            cursor: pointer;
            border: none;
        }
        .range-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 0.4rem; 
        }
        .range-val { 
            font-size: 0.75rem; 
            color: var(--amber); 
            font-weight: 700; 
        }

        /* ── Checkboxes ─────────────────────────────────────────────────── */
        .chord-checks { 
            display: flex; 
            flex-direction: column; 
            gap: 0.35rem; 
        }
        .check-label { 
            display: flex; 
            align-items: center; 
            gap: 0.5rem; 
            font-size: 0.78rem; 
            color: var(--ink-muted); 
            cursor: pointer; 
        }
        .check-label:hover { color: var(--ink); }
        .check-label input { 
            accent-color: var(--amber); 
            cursor: pointer; 
        }

        /* ── Root Key Grid ──────────────────────────────────────────────── */
        .root-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.3rem;
            margin-bottom: 0.5rem;
        }
        .root-btn {
            padding: 0.35rem 0.2rem;
            background: none;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-family: 'Libre Baskerville', serif;
            font-size: 0.72rem;
            color: var(--ink-muted);
            cursor: pointer;
            transition: all 0.12s;
            text-align: center;
        }
        .root-btn:hover { background: var(--paper-dark); border-color: var(--ink); color: var(--ink); }
        .root-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); font-weight: 700; }
        .root-all-row {
            display: flex;
            gap: 0.4rem;
            margin-top: 0.3rem;
        }
        .root-all-btn {
            flex: 1;
            padding: 0.3rem;
            background: none;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-family: 'Libre Baskerville', serif;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--ink-muted);
            cursor: pointer;
            transition: all 0.12s;
        }
        .root-all-btn:hover { border-color: var(--ink); color: var(--ink); background: var(--paper-dark); }
        .circle-row {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.6rem;
        }
        .circle-btn {
            flex: 1;
            padding: 0.45rem 0.5rem;
            font-family: inherit;
            font-size: 0.78rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            border: 1px solid var(--border);
            background: var(--paper);
            color: var(--ink-muted);
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s;
        }
        .circle-btn:hover { border-color: var(--ink); color: var(--ink); background: var(--paper-dark); }
        .circle-btn.active { background: var(--blue); color: var(--paper); border-color: var(--blue); }
        .root-grid.disabled { opacity: 0.4; pointer-events: none; }
        .root-all-row.disabled { opacity: 0.4; pointer-events: none; }

        /* ── Buttons ────────────────────────────────────────────────────── */
        .drone-btn {
            width: 100%;
            padding: 0.9rem;
            background: var(--ink);
            color: var(--paper);
            border: none;
            border-radius: 4px;
            font-family: 'Libre Baskerville', serif;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 0.6rem;
        }
        .drone-btn:hover { 
            background: var(--amber); 
            color: var(--ink); 
        }
        .show-btn {
            width: 100%;
            padding: 0.7rem;
            background: transparent;
            color: var(--ink);
            border: 1.5px solid var(--border);
            border-radius: 4px;
            font-family: 'Libre Baskerville', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .show-btn:hover { 
            border-color: var(--ink); 
            background: var(--paper-dark); 
        }
        .show-btn.active { 
            background: rgba(200,132,26,0.08); 
            border-color: var(--amber); 
            color: var(--amber); 
        }

        /* ── Chord Display ──────────────────────────────────────────────── */
        .chord-display {
            border: 2px solid var(--ink);
            border-radius: 4px;
            padding: 1.8rem 1rem;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-bottom: 1rem;
        }
        .chord-symbol {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 0.4rem;
        }
        .chord-symbol.hidden { 
            color: var(--border); 
            font-size: 2rem; 
        }
        .chord-notes { 
            font-size: 0.75rem; 
            color: var(--ink-muted); 
            letter-spacing: 0.06em; 
        }
        .drone-status { 
            text-align: center; 
            font-size: 0.72rem; 
            color: var(--ink-muted); 
            font-style: italic; 
        }

        /* ── Progress Bar ───────────────────────────────────────────────── */
        .progress-wrap {
            height: 4px;
            background: var(--paper-dark);
            border-radius: 2px;
            margin-bottom: 0.8rem;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .progress-bar {
            height: 100%;
            background: var(--amber);
            border-radius: 2px;
            width: 0%;
            transition: width 1s linear;
        }
        .progress-bar.paused {
            transition: none;
        }

        /* ── Metronome Controls ─────────────────────────────────────────── */
        .metro-controls {
            display: none;
            gap: 0.8rem;
            margin-top: 0.6rem;
        }
        .metro-controls.visible { display: flex; }
        .metro-col { flex: 1; }
        .mode-tabs {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
        }
        .mode-tab {
            flex: 1;
            padding: 0.4rem;
            background: none;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-family: 'Libre Baskerville', serif;
            font-size: 0.72rem;
            color: var(--ink-muted);
            cursor: pointer;
            transition: all 0.12s;
        }
        .mode-tab.active {
            background: var(--ink);
            color: var(--paper);
            border-color: var(--ink);
            font-weight: 700;
        }

        /* ── Pause Button ───────────────────────────────────────────────── */
        .pause-btn {
            width: 100%;
            padding: 0.65rem;
            background: transparent;
            color: var(--ink-muted);
            border: 1.5px solid var(--border);
            border-radius: 4px;
            font-family: 'Libre Baskerville', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 0.6rem;
        }
        .pause-btn:hover:not(:disabled) {
            border-color: var(--ink);
            background: var(--paper-dark);
            color: var(--ink);
        }
        .pause-btn.active {
            background: rgba(200,132,26,0.08);
            border-color: var(--amber);
            color: var(--amber);
        }
        .pause-btn:disabled {
            opacity: 0.35;
            cursor: default;
        }

        /* ── Chord History List ─────────────────────────────────────────── */
        .history-list {
            max-height: 140px;
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse;
            gap: 0.3rem;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0.25rem 0.5rem;
            border-radius: 3px;
            font-size: 0.78rem;
            background: var(--paper-dark);
            border: 1px solid transparent;
        }
        .history-item.current {
            border-color: var(--amber);
            background: rgba(200,132,26,0.07);
        }
        .history-item .h-sym { font-family: 'Playfair Display', serif; font-weight: 700; color: var(--ink); }
        .history-item .h-num { font-size: 0.65rem; color: var(--ink-muted); }

        /* ── Scale Suggestions ──────────────────────────────────────────── */
        .chord-scales {
            font-size: 0.72rem;
            letter-spacing: 0.04em;
            margin-top: 0.35rem;
            font-style: italic;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.3rem 0.6rem;
        }
        .scale-tag {
            display: inline-block;
        }
        .scale-tag.core {
            color: var(--amber);
        }
        .scale-tag.color {
            color: var(--blue);
            opacity: 0.85;
        }
    

        /* ── Embed overrides ── */
        body {
            padding: 0;
            margin: 0;
            background: var(--paper);
            min-height: unset;
            display: block;
        }
        #drone {
            max-width: 100%;
            padding: 0.75rem;
        }
        .card {
            padding: 0.75rem;
            margin-bottom: 0;
            border-radius: 0;
        }
        .control-group {
            margin-bottom: 0.6rem;
        }
        .section-label {
            font-size: 0.65rem;
            margin-bottom: 0.3rem;
        }
        .sound-grid {
            grid-template-columns: repeat(4, 1fr);
            gap: 0.3rem;
        }
        .sound-btn {
            padding: 0.3rem 0.4rem;
            font-size: 0.72rem;
        }
        .mode-tabs {
            margin-bottom: 0.4rem;
        }
        .mode-tab {
            padding: 0.3rem 0.75rem;
            font-size: 0.72rem;
        }
        .root-grid {
            grid-template-columns: repeat(6, 1fr);
            gap: 0.25rem;
        }
        .root-btn {
            padding: 0.3rem 0.2rem;
            font-size: 0.72rem;
        }
        .root-all-row {
            gap: 0.3rem;
            margin-top: 0.3rem;
        }
        .root-all-btn {
            padding: 0.25rem 0.5rem;
            font-size: 0.68rem;
        }
        .circle-row {
            gap: 0.3rem;
            margin-top: 0.3rem;
        }
        .circle-btn {
            padding: 0.3rem 0.4rem;
            font-size: 0.68rem;
        }
        .chord-checks {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.2rem;
        }
        .check-label span {
            font-size: 0.72rem;
        }
        .drone-btn {
            padding: 0.6rem;
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
        }
        .pause-btn {
            padding: 0.4rem;
            font-size: 0.72rem;
            margin-bottom: 0.4rem;
        }
        .drone-status {
            font-size: 0.75rem;
            padding: 0.5rem;
            margin-bottom: 0.4rem;
        }
        input[type="range"] {
            margin: 0.2rem 0;
        }
        .range-row {
            margin-bottom: 0.1rem;
        }
        /* Hide history and scale suggestions to save space */
        .history-section,
        .scale-suggestions,
        #scaleDisplay {
            display: none !important;
        }

    </style>
</head>
<body>


<div id="drone">
    <div class="card">
        <div class="control-group">
            <label class="section-label">Sound</label>
            <div class="sound-grid">
                <button class="sound-btn active" data-sound="strings">Strings</button>
                <button class="sound-btn" data-sound="warm">Warm</button>
                <button class="sound-btn" data-sound="shimmer">Shimmer</button>
                <button class="sound-btn" data-sound="pad">Pad</button>
            </div>
        </div>
        <div class="control-group">
            <label class="section-label">Duration Mode</label>
            <div class="mode-tabs">
                <button class="mode-tab active" id="modeSeconds">Seconds</button>
                <button class="mode-tab" id="modeMetro">Metronome</button>
            </div>
            <!-- Seconds controls -->
            <div id="secControls">
                <div class="range-row">
                    <label class="section-label" style="margin:0">Duration</label>
                    <span class="range-val"><span id="durVal">15</span>s</span>
                </div>
                <input type="range" id="durSlider" min="5" max="60" value="15" step="5">
            </div>
            <!-- Metronome controls -->
            <div id="metroControls" style="display:none">
                <div style="display:flex;gap:0.8rem">
                    <div style="flex:1">
                        <div class="range-row">
                            <label class="section-label" style="margin:0">BPM</label>
                            <span class="range-val"><span id="bpmVal">120</span></span>
                        </div>
                        <input type="range" id="bpmSlider" min="40" max="240" value="120" step="1">
                    </div>
                    <div style="flex:1">
                        <div class="range-row">
                            <label class="section-label" style="margin:0">Bars</label>
                            <span class="range-val"><span id="barsVal">4</span></span>
                        </div>
                        <input type="range" id="barsSlider" min="1" max="8" value="4" step="1">
                    </div>
                </div>
            </div>
        </div>
        <div class="control-group">
            <label class="section-label">Roots</label>
            <div class="root-grid">
                <button class="root-btn active" data-root="C">C</button>
                <button class="root-btn active" data-root="Db">D♭</button>
                <button class="root-btn active" data-root="D">D</button>
                <button class="root-btn active" data-root="Eb">E♭</button>
                <button class="root-btn active" data-root="E">E</button>
                <button class="root-btn active" data-root="F">F</button>
                <button class="root-btn active" data-root="Gb">G♭</button>
                <button class="root-btn active" data-root="G">G</button>
                <button class="root-btn active" data-root="Ab">A♭</button>
                <button class="root-btn active" data-root="A">A</button>
                <button class="root-btn active" data-root="Bb">B♭</button>
                <button class="root-btn active" data-root="B">B</button>
            </div>
            <div class="root-all-row" id="rootAllRow">
                <button class="root-all-btn" id="rootSelectAll">All</button>
                <button class="root-all-btn" id="rootClearAll">Clear</button>
            </div>
            <div class="circle-row">
                <button class="circle-btn" id="circFifthsBtn">Circle of Fifths</button>
                <button class="circle-btn" id="circFourthsBtn">Circle of Fourths</button>
            </div>
        </div>
        <div class="control-group">
            <label class="section-label">Chord Types</label>
            <div class="chord-checks">
                <label class="check-label"><input type="checkbox" class="chord-check" value="major" checked><span>Major (maj7, maj9, 6/9)</span></label>
                <label class="check-label"><input type="checkbox" class="chord-check" value="minor" checked><span>Minor (min7, min9, min11)</span></label>
                <label class="check-label"><input type="checkbox" class="chord-check" value="dominant" checked><span>Dominant (7, 9, 13, 7#11)</span></label>
                <label class="check-label"><input type="checkbox" class="chord-check" value="altered" checked><span>Altered (7b9, 7#9, 7alt)</span></label>
                <label class="check-label"><input type="checkbox" class="chord-check" value="diminished" checked><span>Diminished (min7b5, dim7)</span></label>
            </div>
        </div>
        <div class="control-group">
            <div class="range-row">
                <label class="section-label" style="margin:0">Volume</label>
                <span class="range-val"><span id="volVal">70</span>%</span>
            </div>
            <input type="range" id="volSlider" min="0" max="100" value="70" step="5">
        </div>
        <div class="control-group" style="margin-bottom:0">
            <label class="check-label">
                <input type="checkbox" id="inversionCheck" style="accent-color:var(--amber);cursor:pointer">
                <span style="font-size:0.78rem;color:var(--ink-muted)">Inversions (3rd, 5th, or 7th in bass)</span>
            </label>
        </div>
        <div style="height:1rem"></div>
        <button class="drone-btn" id="droneStartBtn">Start</button>
        <div style="display:flex;gap:0.5rem;margin-bottom:0.6rem">
            <button class="pause-btn" id="dronePauseBtn" disabled style="margin-bottom:0;flex:1">Freeze</button>
            <button class="pause-btn" id="droneBackBtn" disabled style="margin-bottom:0;flex:1">← Back</button>
            <button class="pause-btn" id="droneNextBtn" disabled style="margin-bottom:0;flex:1">Next →</button>
        </div>
        <button class="show-btn" id="droneShowBtn">Show Chords</button>
    </div>

    <div class="card">
        <div class="chord-display">
            <div class="chord-symbol hidden" id="droneSymbol">—</div>
            <div class="chord-notes" id="droneNotes"></div>
            <div class="chord-scales" id="droneScales"></div>
        </div>
        <div class="progress-wrap" id="droneProgressWrap" style="display:none">
            <div class="progress-bar" id="droneProgressBar"></div>
        </div>
        <div class="drone-status" id="droneStatus">Click Start</div>
    </div>

    <div class="card" id="droneHistoryCard" style="display:none">
        <label class="section-label">History</label>
        <div class="history-list" id="droneHistoryList"></div>
    </div>
</div>




<script>

    // ── iOS audio unlock ───────────────────────────────────────────────────
    function unlockAudio(ctx) {
        if (!ctx) return;
        const buf = ctx.createBuffer(1, 1, ctx.sampleRate);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        src.start(0);
        ctx.resume();
    }
    document.addEventListener('touchstart', () => {
        if (droneCtx) unlockAudio(droneCtx);
    }, { once: true });

    // ══════════════════════════════════════════════════════════════════════
    // CHORD DRONE
    // ══════════════════════════════════════════════════════════════════════
    let droneCtx, droneOscs=[], droneGains=[], droneMaster, droneDry, droneWet, droneReverb;
    let dronePlaying=false, dronePaused=false, droneChord=null, droneTimer=null;
    let droneDur=15, droneTimeLeft=15, droneSound='strings', droneShow=false;
    let droneEnabled=new Set(['major','minor','dominant','altered','diminished']);
    let droneEnabledRoots=new Set(['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B']);
    let droneHistory=[], droneHistoryIdx=-1;
    let droneInversions=false;
    let droneCircleMode=null; // null | 'fifths' | 'fourths'
    let droneCircleIdx=0;
    const CIRCLE_OF_FIFTHS  = ['C','G','D','A','E','B','Gb','Db','Ab','Eb','Bb','F'];
    const CIRCLE_OF_FOURTHS = ['C','F','Bb','Eb','Ab','Db','Gb','B','E','A','D','G'];
    let droneMetroMode=false, droneBpm=120, droneBars=4;
    let droneMetroBeat=0, droneMetroTotal=0, droneMetroInterval=null;
    let droneClickGain=null;

    const droneRoots=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
    const droneTypes=[
        {n:'maj7',i:[0,4,7,11],c:'major'},{n:'maj9',i:[0,4,7,11,14],c:'major'},
        {n:'maj7#11',i:[0,4,7,11,18],c:'major'},{n:'6/9',i:[0,4,7,9,14],c:'major'},
        {n:'min7',i:[0,3,7,10],c:'minor'},{n:'min9',i:[0,3,7,10,14],c:'minor'},
        {n:'min11',i:[0,3,7,10,14,17],c:'minor'},{n:'7',i:[0,4,7,10],c:'dominant'},
        {n:'9',i:[0,4,7,10,14],c:'dominant'},{n:'13',i:[0,4,7,10,14,21],c:'dominant'},
        {n:'7#11',i:[0,4,7,10,18],c:'dominant'},{n:'7b9',i:[0,4,7,10,13],c:'altered'},
        {n:'7#9',i:[0,4,7,10,15],c:'altered'},{n:'7alt',i:[0,4,6,10,13],c:'altered'},
        {n:'min7b5',i:[0,3,6,10],c:'diminished'},{n:'dim7',i:[0,3,6,9],c:'diminished'}
    ];
    const droneFreq = s => 130.81*Math.pow(2,s/12);

    // Each scale entry: { mode, parent: semitones up from chord root to parent scale root }
    // Symmetric/non-diatonic scales (diminished, altered) have no diatonic parent — parentOffset omitted
    // tier: 'core' = diatonic major modes (amber)
    //        'color' = mel.minor, harm.minor, harm.major, symmetric (blue)
    // parentOffset: semitones from chord root up to parent scale root
    // parentType label shown in parens
    const droneScaleMap = {
        'maj7': [
            {mode:'Ionian',            parentOffset:0,  parentType:'Major',      tier:'core'},
            {mode:'Lydian',            parentOffset:7,  parentType:'Major',      tier:'core'},
        ],
        'maj9': [
            {mode:'Ionian',            parentOffset:0,  parentType:'Major',      tier:'core'},
            {mode:'Lydian',            parentOffset:7,  parentType:'Major',      tier:'core'},
        ],
        'maj7#11': [
            {mode:'Lydian',            parentOffset:7,  parentType:'Major',      tier:'core'},
        ],
        '6/9': [
            {mode:'Ionian',            parentOffset:0,  parentType:'Major',      tier:'core'},
            {mode:'Lydian',            parentOffset:7,  parentType:'Major',      tier:'core'},
        ],
        'min7': [
            {mode:'Dorian',            parentOffset:10, parentType:'Major',      tier:'core'},
            {mode:'Aeolian',           parentOffset:3,  parentType:'Major',      tier:'core'},
            {mode:'Phrygian',          parentOffset:8,  parentType:'Major',      tier:'core'},
        ],
        'min9': [
            {mode:'Dorian',            parentOffset:10, parentType:'Major',      tier:'core'},
            {mode:'Aeolian',           parentOffset:3,  parentType:'Major',      tier:'core'},
        ],
        'min11': [
            {mode:'Dorian',            parentOffset:10, parentType:'Major',      tier:'core'},
            {mode:'Phrygian',          parentOffset:8,  parentType:'Major',      tier:'core'},
            {mode:'Dorian ♭2',         parentOffset:10, parentType:'Mel. Minor', tier:'color'},
        ],
        '7': [
            {mode:'Mixolydian',        parentOffset:5,  parentType:'Major',      tier:'core'},
            {mode:'Lydian Dominant',   parentOffset:7,  parentType:'Mel. Minor', tier:'color'},
            {mode:'Mixolydian ♭6',     parentOffset:5,  parentType:'Mel. Minor', tier:'color'},
        ],
        '9': [
            {mode:'Mixolydian',        parentOffset:5,  parentType:'Major',      tier:'core'},
            {mode:'Lydian Dominant',   parentOffset:7,  parentType:'Mel. Minor', tier:'color'},
        ],
        '13': [
            {mode:'Mixolydian',        parentOffset:5,  parentType:'Major',      tier:'core'},
            {mode:'Lydian Dominant',   parentOffset:7,  parentType:'Mel. Minor', tier:'color'},
        ],
        '7#11': [
            {mode:'Lydian Dominant',   parentOffset:7,  parentType:'Mel. Minor', tier:'color'},
        ],
        '7b9': [
            {mode:'Phrygian Dominant', parentOffset:5,  parentType:'Harm. Minor',tier:'color'},
            {mode:'HW Diminished',                                                tier:'color'},
            {mode:'Mixolydian ♭9♭13',  parentOffset:5,  parentType:'Harm. Major',tier:'color'},
        ],
        '7#9': [
            {mode:'Altered',           parentOffset:1,  parentType:'Mel. Minor', tier:'color'},
            {mode:'HW Diminished',                                                tier:'color'},
        ],
        '7alt': [
            {mode:'Altered',           parentOffset:1,  parentType:'Mel. Minor', tier:'color'},
            {mode:'Whole Tone',                                                   tier:'color'},
        ],
        'min7b5': [
            {mode:'Locrian',           parentOffset:1,  parentType:'Major',      tier:'core'},
            {mode:'Locrian ♮2',        parentOffset:3,  parentType:'Mel. Minor', tier:'color'},
            {mode:'Locrian ♮6',        parentOffset:1,  parentType:'Harm. Minor',tier:'color'},
        ],
        'dim7': [
            {mode:'WH Diminished',                                                tier:'color'},
            {mode:'HW Diminished',                                                tier:'color'},
        ],
    };

    function droneFormatScales(chord) {
        if (!chord || !chord.scales || !chord.scales.length) return '';
        const rootIdx = droneRoots.indexOf(chord.root);
        return chord.scales.map(s => {
            let label = s.mode;
            if (s.parentOffset !== undefined && s.parentType) {
                const parentIdx = (rootIdx + s.parentOffset) % 12;
                label += ' (' + droneRoots[parentIdx] + ' ' + s.parentType + ')';
            }
            return `<span class="scale-tag ${s.tier}">${label}</span>`;
        }).join('<span style="color:var(--border)"> · </span>');
    }
    const dronePatchDefs = {
        strings: { layers:[{w:'sawtooth',detunes:[-8,0,8],gain:0.5},{w:'triangle',detunes:[0],gain:0.25}], attack:1.2, filter:{type:'lowpass',freq:1200,q:1}, vol:1.0 },
        warm:    { layers:[{w:'sawtooth',detunes:[-6,0,6],gain:0.45},{w:'sine',detunes:[0],gain:0.3}], attack:2.0, filter:{type:'lowpass',freq:800,q:0.5}, vol:1.1 },
        lush:    { layers:[{w:'sawtooth',detunes:[-18,-9,0,9,18],gain:0.35}], attack:1.6, filter:{type:'lowpass',freq:1400,q:1.2}, vol:0.9 },
        shimmer: { layers:[{w:'sawtooth',detunes:[-5,0,5],gain:0.4},{w:'triangle',detunes:[-4,4],gain:0.2,octaveUp:true}], attack:2.5, filter:{type:'lowpass',freq:2200,q:0.7}, vol:0.85 },
        hollow:  { layers:[{w:'square',detunes:[-6,0,6],gain:0.3}], attack:1.4, filter:{type:'bandpass',freq:900,q:2.5}, vol:1.0 },
        dark:    { layers:[{w:'sawtooth',detunes:[-4,0,4],gain:0.5},{w:'triangle',detunes:[0],gain:0.35}], attack:3.5, filter:{type:'lowpass',freq:550,q:1.5}, vol:1.2 },
        pad:     { layers:[{w:'sine',detunes:[-5,0,5],gain:0.5},{w:'sine',detunes:[0],gain:0.3}], attack:2.0, filter:{type:'lowpass',freq:2000,q:0.5}, vol:1.0 },
        bells:   { layers:[{w:'triangle',detunes:[0],gain:0.6},{w:'sine',detunes:[0],gain:0.4,octaveUp:true}], attack:0.01, filter:{type:'lowpass',freq:4000,q:1}, vol:0.8 },
    };

    function droneInit() {
        if (!droneCtx) {
            droneCtx = new (window.AudioContext||window.webkitAudioContext)();
            droneMaster=droneCtx.createGain(); droneMaster.gain.value=0.7;
            droneDry=droneCtx.createGain(); droneWet=droneCtx.createGain();
            droneReverb=droneCtx.createConvolver();
            const sr=droneCtx.sampleRate, len=sr*2.5;
            const imp=droneCtx.createBuffer(2,len,sr);
            const L=imp.getChannelData(0), R=imp.getChannelData(1);
            for (let i=0;i<len;i++){const e=Math.exp(-(i/len)*2.5);L[i]=(Math.random()*2-1)*e;R[i]=(Math.random()*2-1)*e;}
            droneReverb.buffer=imp;
            droneDry.gain.value=0.4; droneWet.gain.value=0.6;
            droneDry.connect(droneMaster); droneWet.connect(droneReverb);
            droneReverb.connect(droneMaster); droneMaster.connect(droneCtx.destination);
        }
        if (!droneClickGain) {
            droneClickGain = droneCtx.createGain();
            droneClickGain.gain.value = 0.4;
            droneClickGain.connect(droneMaster);
        }
        if (droneCtx.state==='suspended') droneCtx.resume();
    }

    function droneClick(accent) {
        if (!droneCtx || !droneClickGain) return;
        const now = droneCtx.currentTime;
        const osc = droneCtx.createOscillator();
        const g = droneCtx.createGain();
        osc.frequency.value = accent ? 1200 : 800;
        osc.type = 'sine';
        g.gain.setValueAtTime(accent ? 0.6 : 0.3, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
        osc.connect(g); g.connect(droneClickGain);
        osc.start(now); osc.stop(now + 0.06);
    }

    function droneMetroDuration() {
        // seconds per bar = beats_per_bar(4) * seconds_per_beat
        return droneBars * 4 * (60 / droneBpm);
    }

    function droneGen() {
        const avail=droneTypes.filter(t=>droneEnabled.has(t.c));
        if (!avail.length){droneEnabled.add('major');return droneGen();}
        let r;
        if (droneCircleMode) {
            const circle = droneCircleMode === 'fifths' ? CIRCLE_OF_FIFTHS : CIRCLE_OF_FOURTHS;
            r = circle[droneCircleIdx % 12];
            droneCircleIdx++;
        } else {
            const availRoots = droneRoots.filter(r => droneEnabledRoots.has(r));
            if (!availRoots.length) return droneGen(); // fallback — shouldn't happen
            r = availRoots[~~(Math.random() * availRoots.length)];
        }
        const t=avail[~~(Math.random()*avail.length)];
        const ro=droneRoots.indexOf(r);

        // Sort chord tones ascending and stack them in register order.
        // Using absolute intervals (not mod-12) keeps extensions like #9 (15)
        // correctly above the b7 (10) rather than conflated with the b3 (3).
        const chordTones = t.i;
        const sortedTones = [...chordTones].sort((a, b) => a - b);

        // Bass voice: root one octave below
        let voicing = [sortedTones[0] - 12];
        let cursor = sortedTones[0];

        // Stack remaining tones, bumping each up by octaves until it sits above cursor
        for (let k = 1; k < sortedTones.length; k++) {
            let target = sortedTones[k];
            while (target <= cursor) target += 12;
            voicing.push(target);
            cursor = target;
        }

        // Remove any voices that ended up too high (cap at ~2 octaves above bass)
        voicing = voicing.filter(i => i <= chordTones[0] + 24);

        // Inversion: add 3rd, 5th, or 7th as extra bass note below the full voicing
        let bassNoteName = null;
        if (droneInversions && sortedTones.length >= 2 && Math.random() < 0.5) {
            const options = sortedTones.slice(1, 4); // 3rd, 5th, 7th (skip root)
            const chosen = options[~~(Math.random() * options.length)];
            // Place chosen tone below voicing[0] (root bass)
            let bassVal = chosen;
            while (bassVal >= voicing[0]) bassVal -= 12;
            voicing.unshift(bassVal);
            bassNoteName = droneRoots[((ro + chosen) % 12 + 12) % 12];
        }

        const scales = droneScaleMap[t.n] || [];
        const sym = bassNoteName ? r + t.n + '/' + bassNoteName : r + t.n;
        return {
            sym,
            root: r,
            freqs: voicing.map(i => droneFreq(ro + i)),
            notes: voicing.map(i => droneRoots[((ro + i) % 12 + 12) % 12]).join(' - '),
            scales: scales
        };
    }

    function dronePlay(ch) {
        droneStop(); droneOscs=[]; droneGains=[];
        const now = droneCtx.currentTime;
        const patch = dronePatchDefs[droneSound];

        ch.freqs.forEach(freq => {
            patch.layers.forEach(layer => {
                const baseFreq = layer.octaveUp ? freq * 2 : freq;
                layer.detunes.forEach(det => {
                    const osc = droneCtx.createOscillator();
                    const oscGain = droneCtx.createGain();
                    const flt = droneCtx.createBiquadFilter();
                    const envGain = droneCtx.createGain();

                    osc.type = layer.w;
                    osc.frequency.value = baseFreq;
                    osc.detune.value = det;
                    oscGain.gain.value = layer.gain;

                    flt.type = patch.filter.type;
                    flt.frequency.value = patch.filter.freq;
                    flt.Q.value = patch.filter.q;

                    // amplitude scaled by frequency (quieter in high register)
                    const vol = Math.min(0.15 / Math.sqrt(baseFreq / 200), 0.2) * patch.vol;
                    envGain.gain.setValueAtTime(0, now);
                    envGain.gain.linearRampToValueAtTime(vol, now + patch.attack);

                    osc.connect(oscGain);
                    oscGain.connect(flt);
                    flt.connect(envGain);
                    envGain.connect(droneDry);
                    envGain.connect(droneWet);
                    osc.start(now);

                    droneOscs.push(osc);
                    droneGains.push(envGain);
                });
            });
        });
    }

    function droneStop() {
        if (!droneCtx) return;
        const now = droneCtx.currentTime;
        droneOscs.forEach((o, i) => {
            const g = droneGains[i];
            if (g) {
                g.gain.cancelScheduledValues(now);
                g.gain.setValueAtTime(g.gain.value, now);
                g.gain.linearRampToValueAtTime(0, now + 0.8);
            }
            try { o.stop(now + 0.8); } catch(e) {}
        });
        droneOscs=[]; droneGains=[];
    }

    function droneNext() {
        // if we're mid-history (user went back), truncate forward history
        if (droneHistoryIdx < droneHistory.length - 1) {
            droneHistory = droneHistory.slice(0, droneHistoryIdx + 1);
        }
        droneChord=droneGen();
        droneHistory.push(droneChord);
        if (droneHistory.length > 10) droneHistory.shift();
        droneHistoryIdx=droneHistory.length-1;
        document.getElementById('droneBackBtn').disabled = droneHistoryIdx <= 0;
        if (dronePlaying){dronePlay(droneChord); droneStartTimer();}
        droneUpdateDisplay();
    }

    function droneBack() {
        if (droneHistoryIdx <= 0) return;
        droneHistoryIdx--;
        droneChord=droneHistory[droneHistoryIdx];
        document.getElementById('droneBackBtn').disabled = droneHistoryIdx <= 0;
        if (dronePlaying){dronePlay(droneChord); droneStartTimer();}
        droneUpdateDisplay();
    }

    function droneUpdateDisplay() {
        const sym = document.getElementById('droneSymbol');
        const notes = document.getElementById('droneNotes');
        const scales = document.getElementById('droneScales');
        if (droneShow && droneChord) {
            sym.textContent = droneChord.sym;
            sym.classList.remove('hidden');
            notes.textContent = droneChord.notes;
            scales.innerHTML = droneFormatScales(droneChord);
        } else {
            sym.textContent = '???';
            sym.classList.add('hidden');
            notes.textContent = '';
            scales.innerHTML = '';
        }
        droneUpdateHistoryUI();
    }

    function droneUpdateHistoryUI() {
        const list = document.getElementById('droneHistoryList');
        const card = document.getElementById('droneHistoryCard');
        if (droneHistory.length === 0) { card.style.display = 'none'; return; }
        card.style.display = 'block';
        list.innerHTML = '';
        droneHistory.forEach((ch, idx) => {
            const el = document.createElement('div');
            el.className = 'history-item' + (idx === droneHistoryIdx ? ' current' : '');
            const label = droneShow ? ch.sym : '???';
            el.innerHTML = `<span class="h-sym">${label}</span><span class="h-num">#${idx + 1}</span>`;
            list.appendChild(el);
        });
        // scroll to bottom (most recent)
        list.scrollTop = list.scrollHeight;
    }

    function droneUpdateProgress() {
        const bar = document.getElementById('droneProgressBar');
        const pct = (droneTimeLeft / droneDur) * 100;
        bar.style.width = pct + '%';
    }

    function droneStartTimer() {
        // clear any existing timers
        if (droneTimer) clearInterval(droneTimer);
        if (droneMetroInterval) clearInterval(droneMetroInterval);

        const totalDur = droneMetroMode ? droneMetroDuration() : droneDur;
        droneTimeLeft = totalDur;

        // reset and start progress bar (fills left to right)
        const wrap = document.getElementById('droneProgressWrap');
        const bar = document.getElementById('droneProgressBar');
        wrap.style.display = 'block';
        bar.style.transition = 'none';
        bar.style.width = '0%';
        bar.getBoundingClientRect(); // force reflow
        bar.style.transition = `width ${totalDur}s linear`;
        bar.style.width = '100%';

        if (droneMetroMode) {
            const beatDur = 60 / droneBpm;
            const totalBeats = droneBars * 4;
            droneMetroBeat = 0;
            droneMetroTotal = totalBeats;
            droneClick(true); // beat 1 accent
            droneMetroInterval = setInterval(() => {
                if (dronePaused) return;
                droneMetroBeat++;
                if (droneMetroBeat >= totalBeats) {
                    droneNext();
                } else {
                    droneClick(droneMetroBeat % 4 === 0); // accent on bar 1
                    const beatsLeft = totalBeats - droneMetroBeat;
                    const barsLeft = Math.ceil(beatsLeft / 4);
                    document.getElementById('droneStatus').textContent =
                        `Beat ${(droneMetroBeat % 4) + 1}  ·  ${barsLeft} bar${barsLeft !== 1 ? 's' : ''} left`;
                }
            }, beatDur * 1000);
        } else {
            droneTimer = setInterval(() => {
                if (dronePaused) return;
                droneTimeLeft--;
                document.getElementById('droneStatus').textContent = `Next in ${droneTimeLeft}s`;
                if (droneTimeLeft <= 0) droneNext();
            }, 1000);
        }
    }

    document.querySelectorAll('.sound-btn').forEach(b=>{
        b.onclick=()=>{
            document.querySelectorAll('.sound-btn').forEach(x=>x.classList.remove('active'));
            b.classList.add('active'); droneSound=b.dataset.sound;
            if (dronePlaying&&droneChord) dronePlay(droneChord);
        };
    });

    document.querySelectorAll('.chord-check').forEach(cb=>{
        cb.onchange=e=>{ e.target.checked?droneEnabled.add(e.target.value):droneEnabled.delete(e.target.value); };
    });

    document.getElementById('droneStartBtn').onclick=()=>{
        if (!dronePlaying){
            droneInit();
            droneCtx.resume().then(()=>{
                dronePlaying=true; dronePaused=false;
                document.getElementById('droneStartBtn').textContent='Stop';
                document.getElementById('dronePauseBtn').disabled=false;
                document.getElementById('droneNextBtn').disabled=false;
                droneHistory=[]; droneHistoryIdx=-1;
                droneNext();
            });
        } else {
            dronePlaying=false; dronePaused=false;
            document.getElementById('droneStartBtn').textContent='Start';
            const pauseBtn=document.getElementById('dronePauseBtn');
            pauseBtn.disabled=true; pauseBtn.textContent='Freeze'; pauseBtn.classList.remove('active');
            document.getElementById('droneBackBtn').disabled=true;
            document.getElementById('droneNextBtn').disabled=true;
            document.getElementById('droneHistoryCard').style.display='none';
            droneStop();
            if (droneTimer) clearInterval(droneTimer);
            if (droneMetroInterval) clearInterval(droneMetroInterval);
            document.getElementById('droneStatus').textContent='Stopped';
            const wrap=document.getElementById('droneProgressWrap');
            const bar=document.getElementById('droneProgressBar');
            wrap.style.display='none';
            bar.style.transition='none'; bar.style.width='100%';
        }
    };

    document.getElementById('dronePauseBtn').onclick=()=>{
        if (!dronePlaying) return;
        dronePaused=!dronePaused;
        const pauseBtn=document.getElementById('dronePauseBtn');
        const bar=document.getElementById('droneProgressBar');
        if (dronePaused){
            pauseBtn.textContent='Unfreeze'; pauseBtn.classList.add('active');
            const computed=getComputedStyle(bar).width;
            bar.style.transition='none';
            bar.style.width=computed;
            document.getElementById('droneStatus').textContent='Frozen';
        } else {
            pauseBtn.textContent='Freeze'; pauseBtn.classList.remove('active');
            // resume bar from current position toward 100%
            const totalDur = droneMetroMode ? droneMetroDuration() : droneDur;
            const remainSecs = droneMetroMode
                ? (droneMetroTotal - droneMetroBeat) * (60 / droneBpm)
                : droneTimeLeft;
            bar.style.transition=`width ${remainSecs}s linear`;
            bar.style.width='100%';
            document.getElementById('droneStatus').textContent = droneMetroMode
                ? `Beat ${(droneMetroBeat % 4) + 1}`
                : `Next in ${droneTimeLeft}s`;
        }
    };

    document.getElementById('droneBackBtn').onclick=()=>{ droneBack(); };

    document.querySelectorAll('.root-btn').forEach(b => {
        b.onclick = () => {
            const root = b.dataset.root;
            if (droneEnabledRoots.has(root)) {
                // don't allow deselecting the last one
                if (droneEnabledRoots.size <= 1) return;
                droneEnabledRoots.delete(root);
                b.classList.remove('active');
            } else {
                droneEnabledRoots.add(root);
                b.classList.add('active');
            }
        };
    });

    function setCircleMode(mode) {
        droneCircleMode = droneCircleMode === mode ? null : mode;
        droneCircleIdx = droneCircleMode ? ~~(Math.random() * 12) : 0;
        const rootGrid = document.querySelector('.root-grid');
        const rootAllRow = document.getElementById('rootAllRow');
        const fifthsBtn = document.getElementById('circFifthsBtn');
        const fourthsBtn = document.getElementById('circFourthsBtn');
        if (droneCircleMode) {
            rootGrid.classList.add('disabled');
            rootAllRow.classList.add('disabled');
        } else {
            rootGrid.classList.remove('disabled');
            rootAllRow.classList.remove('disabled');
        }
        fifthsBtn.classList.toggle('active', droneCircleMode === 'fifths');
        fourthsBtn.classList.toggle('active', droneCircleMode === 'fourths');
    }
    document.getElementById('circFifthsBtn').onclick = () => setCircleMode('fifths');
    document.getElementById('circFourthsBtn').onclick = () => setCircleMode('fourths');

    document.getElementById('rootSelectAll').onclick = () => {
        droneRoots.forEach(r => droneEnabledRoots.add(r));
        document.querySelectorAll('.root-btn').forEach(b => b.classList.add('active'));
    };

    document.getElementById('rootClearAll').onclick = () => {
        // keep at least one — last active stays
        const active = [...document.querySelectorAll('.root-btn.active')];
        if (active.length <= 1) return;
        // clear all except the first
        active.slice(1).forEach(b => {
            droneEnabledRoots.delete(b.dataset.root);
            b.classList.remove('active');
        });
    };

    document.getElementById('droneNextBtn').onclick=()=>{
        if (dronePlaying) droneNext();
    };

    document.getElementById('volSlider').oninput=e=>{
        const val = +e.target.value;
        document.getElementById('volVal').textContent = val;
        if (droneMaster) droneMaster.gain.setTargetAtTime(val/100, droneCtx.currentTime, 0.05);
    };

    document.getElementById('inversionCheck').onchange=e=>{
        droneInversions = e.target.checked;
    };

    document.getElementById('droneShowBtn').onclick=()=>{
        droneShow=!droneShow;
        document.getElementById('droneShowBtn').classList.toggle('active');
        droneUpdateDisplay();
    };

    document.getElementById('durSlider').oninput=e=>{
        droneDur=+e.target.value;
        document.getElementById('durVal').textContent=droneDur;
    };

    document.getElementById('bpmSlider').oninput=e=>{
        droneBpm=+e.target.value;
        document.getElementById('bpmVal').textContent=droneBpm;
    };

    document.getElementById('barsSlider').oninput=e=>{
        droneBars=+e.target.value;
        document.getElementById('barsVal').textContent=droneBars;
    };

    document.getElementById('modeSeconds').onclick=()=>{
        droneMetroMode=false;
        document.getElementById('modeSeconds').classList.add('active');
        document.getElementById('modeMetro').classList.remove('active');
        document.getElementById('secControls').style.display='block';
        document.getElementById('metroControls').style.display='none';
    };

    document.getElementById('modeMetro').onclick=()=>{
        droneMetroMode=true;
        document.getElementById('modeMetro').classList.add('active');
        document.getElementById('modeSeconds').classList.remove('active');
        document.getElementById('metroControls').style.display='block';
        document.getElementById('secControls').style.display='none';
    };


    // ── URL Parameter Loader ─────────────────────────────────────────────────
    // Runs after all drone init code — pre-configures drone from URL params
    (function applyUrlParams() {
        const params = new URLSearchParams(window.location.search);
        if (!params.toString()) return; // nothing to do

        // Root: set only the specified root
        const root = params.get('root');
        if (root) {
            const rootUpper = root.charAt(0).toUpperCase() + root.slice(1);
            if (droneRoots.includes(rootUpper)) {
                droneEnabledRoots.clear();
                document.querySelectorAll('.root-btn').forEach(b => {
                    b.classList.remove('active');
                });
                droneEnabledRoots.add(rootUpper);
                document.querySelectorAll('.root-btn').forEach(b => {
                    if (b.dataset.root === rootUpper) b.classList.add('active');
                });
            }
        }

        // Chord: find the chord type, enable only its category
        const chord = params.get('chord');
        if (chord) {
            // decode %23 -> #
            const chordDecoded = decodeURIComponent(chord);
            const chordType = droneTypes.find(t => t.n === chordDecoded);
            if (chordType) {
                droneEnabled.clear();
                droneEnabled.add(chordType.c);
                document.querySelectorAll('.chord-check').forEach(cb => {
                    cb.checked = (cb.value === chordType.c);
                });
            }
        }

        // Sound patch
        const sound = params.get('sound');
        if (sound) {
            droneSound = sound;
            document.querySelectorAll('.sound-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.sound === sound);
            });
        }

        // Duration
        const dur = params.get('dur');
        if (dur) {
            const durVal = parseInt(dur);
            if (!isNaN(durVal)) {
                droneDur = durVal;
                droneTimeLeft = durVal;
                const slider = document.getElementById('durSlider');
                const display = document.getElementById('durVal');
                if (slider) slider.value = durVal;
                if (display) display.textContent = durVal;
            }
        }

        // Circle mode
        const mode = params.get('mode');
        if (mode === 'fifths' || mode === 'fourths') {
            setCircleMode(mode);
        }
    })();

</script>
